    Research:
      - company: Emory University
        position: NLP Researcher — Clinical Inconsistency Detection
        location: Atlanta, GA
        start_date: 2026-01
        end_date: present
        highlights:
          - Formulated cross-note inconsistency detection in MIMIC-IV as a weakly supervised bag-level evidence learning task, enabling admission-level supervision over latent contradictory evidence.
          - Built an end-to-end clinical NLP pipeline generating a 110K 3-way silver corpus from discharge summaries and radiology reports.
          - Trained a Transformer-based bag model with temporal, assertion-aware, and structured EHR features.
          - Achieved 0.936 macro-F1 and 0.949 contradiction F1 on in-distribution test set; 0.945 macro-F1 on temporal OOD split.
          - Downstream validation showed positive AUROC gain for ICU-stay prediction over a structured baseline.

      - company: Emory University
        position: ML Researcher — Counterfactual MLLM Benchmark
        location: Atlanta, GA
        start_date: 2026-01
        end_date: present
        highlights:
          - Addressed a key evaluation gap in multimodal chart understanding by building a counterfactual benchmark that isolates visual encoding errors from data/task errors.
          - Generated 400 paired instances across 5 tasks, 5 deception types, and 3 chart families with deterministic oracle-based scoring.
          - Designed evaluation metrics including Deception Gap, Flip Rate, and Repair Consistency.
          - Evaluated GPT-4o, Claude 3.5 Sonnet, Gemini 2.0 Flash, and a chart-to-table baseline; found misleading encodings caused substantial conclusion instability.

      - company: Emory University
        position: ML Researcher — EPI-SSM Epidemic Forecasting
        location: Atlanta, GA
        start_date: 2025-08
        end_date: present
        highlights:
          - Proposed EPI-SSM, a probabilistic sequence model integrating patch-based temporal representations, latent state rollout, and heteroscedastic Gaussian emissions for multi-horizon epidemic forecasting.
          - Built an end-to-end pipeline over regional surveillance time series with temporal data leakage constraints and zero-shot transfer evaluation.
          - Implemented variance-regularized likelihood objectives; evaluated with CRPS, calibration score, and coverage-sensitive metrics.
          - Ran large-scale baseline comparisons across RNN, CNN, linear, Transformer, and epidemiology-specific models.
